# Lima VM for reproducing CVE-2026-31431 (copy.fail)
# Boots Debian 12 bookworm, downgrades to the vulnerable kernel (6.1.162-1),
# then runs the exploit non-interactively.
#
# Usage (run from the repo directory):
#   limactl start --name=copyfail --mount-none --tty=false ./copy_fail.yml
#   limactl shell --sync . copyfail sudo bash provision.sh
#   limactl shell --sync . copyfail sudo bash verify.sh

---
images:
  # Pinned build — kernel 6.1.0-43-cloud-amd64 (6.1.162-1), vulnerable to CVE-2026-31431
  - location: "https://cloud.debian.org/images/cloud/bookworm/20260502-2466/debian-12-genericcloud-amd64-20260502-2466.qcow2"
    arch: "x86_64"
  # Fallback to latest release (may already be patched; provision.sh will downgrade)
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
    arch: "x86_64"

cpus: 2
memory: 2GiB
disk: 20GiB

vmType: qemu
arch: x86_64

hostResolver:
  hosts:
    host.lima.internal: host.lima.internal

containerd:
  system: false
  user: false

probes:
  - script: |
      #!/bin/bash
      set -eux -o pipefail
      uname -r
    hint: "VM booted. Run: limactl shell --sync . copyfail sudo bash provision.sh"

message: |
  VM is up. Next steps (run from the repo directory):
  ------
  # 1. Run provision (downgrades kernel, reboots into vulnerable version)
  limactl shell --sync . copyfail sudo bash provision.sh

  # 2. After reboot, verify kernel and detonate exploit
  limactl shell --sync . copyfail sudo bash verify.sh
  ------
